<div>
  <app-address-nav-header></app-address-nav-header>
  <nav class="navbar navbar-expand-lg navbar-light header container-fluid main-navbar">
    <button class="navbar-toggler" type="button" (click)="toggleMenu($event)"
            aria-controls="menuDropdown" [attr.aria-expanded]="isMenuOpen" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <a href="http://sadisha.org/" class="navbar-brand logo">
      <img src="assets/images/sadisha.png" class="img-fluid logo-img" alt="Logo">
    </a>

    <div class="collapse navbar-collapse justify-content-end" id="menuDropdown" [class.show]="isMenuOpen">
      <div>
        <ul class="navbar-nav mr-auto mt-2 mt-lg-0">
          <li class="nav-item px-12 mx-4" routerLinkActive="active">
            <a class="nav-link" [routerLink]="['/home']" (click)="toggleMenu($event)">
              Home
            </a>
          </li>
          <li class="nav-item dropdown px-12 mx-4" routerLinkActive="active">
            <a class="nav-link dropdown-toggle" href="#" (click)="toggleRegisterDropdown($event)"
               role="button" [attr.aria-expanded]="isRegisterDropdownOpen">
              REGISTER
            </a>
            <div class="dropdown-menu" [class.show]="isRegisterDropdownOpen">
              <a class="dropdown-item" [routerLink]="['/student-registration']" (click)="toggleRegisterDropdown($event)" (click)="toggleMenu($event)">As a Student</a>
              <div class="dropdown-divider"></div>
              <a class="dropdown-item" [routerLink]="['/volunteer-registration']" (click)="toggleRegisterDropdown($event)" (click)="toggleMenu($event)">As a Volunteer</a>
            </div>
          </li>
          <li class="nav-item px-12 mx-4" routerLinkActive="active">
            <a class="nav-link" [routerLink]="['/faq']" (click)="toggleMenu($event)">
              FAQ
            </a>
          </li>
          <li class="nav-item px-12 mx-4" routerLinkActive="active">
            <a class="nav-link" [routerLink]="['/talent-test']" (click)="toggleMenu($event)">
              MATHS TALENT TEST
            </a>
          </li>
          <li class="nav-item px-12 mx-4" routerLinkActive="active">
            <a class="nav-link" [routerLink]="['/gallery']" (click)="toggleMenu($event)">
              GALLERY
            </a>
          </li>
          <li class="nav-item px-12 mx-4" routerLinkActive="active">
            <a class="nav-link" [routerLink]="['/press']" (click)="toggleMenu($event)">
              PRESS
            </a>
          </li>
          <li class="nav-item px-12 mx-4" routerLinkActive="active">
            <a class="nav-link" [routerLink]="['/contact-us']" (click)="toggleMenu($event)">
              CONTACT US
            </a>
          </li>
          <li class="nav-item px-12 mx-4" routerLinkActive="active">
            <a class="nav-link" [routerLink]="['/login']" (click)="toggleMenu($event)">
              SIGN IN
            </a>
          </li>
        </ul>
      </div>
    </div>
  </nav>
</div>
