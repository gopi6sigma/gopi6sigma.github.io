<div>
    <app-hero-image [heading]="'Sadisha Maths Talent Test Notifications, Practice papers and Results'"
        [bgImageClass]="'talent-test'"></app-hero-image>
    <div class="talent-test bg-white pt-3">
        <div class="container-fluid p-0">
            <div class="d-flex justify-content-center custom-tabs m-b-16 animated fadeInRight">
                <ul class="list-unstyled d-flex">
                    <li [routerLink]="['/talent-test/notifications']" routerLinkActive="active">Notifications</li>
                    <li [routerLink]="['/talent-test/previous-papers']" routerLinkActive="active">Previous Papers</li>
                    <li [routerLink]="['/talent-test/final-results']" routerLinkActive="active">Final Result</li>
                </ul>
            </div>
            <div>
                <router-outlet></router-outlet>
            </div>
        </div>
    </div>
</div>
